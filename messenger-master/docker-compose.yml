services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    # Явно указываем переменные для приложения 'web', чтобы они соответствовали 'db'
    # и переопределяли значения по умолчанию в config.py, если они отличаются.
    # Если config.py корректно читает .env, то эти строки могут быть необязательны,
    # но для гарантии согласованности лучше их оставить.
    environment:
      - POSTGRES_USER=Admin           # Имя пользователя, которое будет использоваться приложением
      - POSTGRES_PASSWORD=Admin8903    # Пароль для подключения к БД
      - POSTGRES_HOST=db              # Имя хоста БД (совпадает с именем сервиса БД в docker-compose)
      - POSTGRES_PORT=5432
      - POSTGRES_DB=messenger_db      # Имя базы данных, к которой подключается приложение
      - SECRET_KEY=your-secret-key-here # Убедись, что этот ключ сложный и уникальный
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:13
    # Используем bind mount для хранения данных БД на твоей локальной машине.
    # Это удобно для разработки, чтобы данные сохранялись между запусками.
    # После удаления этой папки (как мы делали ранее), БД будет переинициализирована.
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/
    # Явно указываем переменные для контейнера PostgreSQL.
    # Эти переменные будут использоваться для инициализации БД и создания пользователя/базы.
    # ОНИ ДОЛЖНЫ СОВПАДАТЬ с теми, что используются в сервисе 'web' и в твоем .env!
    environment:
      - POSTGRES_USER=Admin           # Имя пользователя, которое будет создано в PostgreSQL
      - POSTGRES_PASSWORD=Admin8903    # Пароль для этого пользователя
      - POSTGRES_DB=messenger_db      # Имя базы данных, которая будет создана
    ports:
      - "5432:5432" # Пробрасываем порт БД на твой хост, чтобы можно было подключиться извне, если нужно.
    healthcheck:
      # Проверка здоровья контейнера БД. Убеждается, что БД готова принимать соединения.
      # Использует те же переменные, что и для инициализации.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Этот раздел `volumes` можно убрать, так как мы используем bind mount (./postgres_data),
# который не является именованным томом Docker. Однако, его наличие не вредит,
# но он не будет использоваться сервисом 'db' напрямую.
# В данном случае, это скорее "заглушка" или остаток от другой конфигурации.
# Если хочешь использовать именно именованный том Docker (что обычно лучше),
# то строка в db -> volumes должна быть "- postgres_data:/var/lib/postgresql/data/"
# и этой секции volumes: postgres_data: тогда не будет лишней.
volumes:
  postgres_data:
